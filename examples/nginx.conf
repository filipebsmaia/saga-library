worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  # ── Connection tuning ──
  keepalive_timeout 65;
  keepalive_requests 1000;
  proxy_connect_timeout 5s;
  proxy_read_timeout 30s;
  proxy_send_timeout 10s;

  # Backend monitor (5 replicas)
  upstream monitor_backend {
    server monitor-backend:3100;
    keepalive 64;
  }

  # Order saga (5 replicas)
  upstream order_saga {
    server order-saga:3000;
    keepalive 128;
  }

  server {
    listen 3100;

    # SSE streams: disable buffering
    location /v1/stream/ {
      proxy_pass http://monitor_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      proxy_read_timeout 86400s;
    }

    location / {
      proxy_pass http://monitor_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  server {
    listen 3000;

    location / {
      proxy_pass http://order_saga;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
