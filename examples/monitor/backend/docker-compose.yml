services:
  postgres:
    image: postgres:18-alpine
    container_name: saga-monitor-postgres
    shm_size: "256mb"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saga_monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - effective_cache_size=512MB
      - -c
      - synchronous_commit=off
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - wal_writer_delay=200ms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d saga_monitor"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - saga-monitor

  redis:
    image: redis:7-alpine
    container_name: saga-monitor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - saga-monitor

  kafka:
    image: apache/kafka:3.9.0
    container_name: saga-monitor-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Auto-create topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      # Single-node: internal topics must have replication factor 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Cluster ID
      CLUSTER_ID: saga-monitor-cluster-01000
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    volumes:
      - kafkadata:/var/lib/kafka/data
    networks:
      - saga-monitor

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: saga-monitor-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: saga-monitor
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - saga-monitor

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: saga-monitor-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - saga-monitor

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: saga-monitor-otel-collector
    ports:
      - "4317:4317"
      - "4319:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
    networks:
      - saga-monitor

  prometheus:
    image: prom/prometheus:latest
    container_name: saga-monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - otel-collector
    networks:
      - saga-monitor

  grafana:
    image: grafana/grafana:latest
    container_name: saga-monitor-grafana
    ports:
      - "9091:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - saga-monitor

volumes:
  pgdata:
  kafkadata:

networks:
  saga-monitor:
    driver: bridge
